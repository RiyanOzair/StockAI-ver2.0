name: CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: ""          # tests run in demo/mock mode without a key
        run: python -m pytest tests/ -q --tb=short

  build_and_push:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stockai:latest
            ghcr.io/${{ github.repository_owner }}/stockai:${{ github.sha }}

      - name: Confirm
        run: echo "Image pushed → ghcr.io/${{ github.repository_owner }}/stockai:${{ github.sha }}"

      # ── Optional: deploy to Google Cloud Run ──────────────────────────────
      # Uncomment and add GCP_SERVICE_ACCOUNT_KEY secret to enable:
      #
      # - name: Deploy to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v2
      #   with:
      #     service: stockai
      #     region: us-central1
      #     image: ghcr.io/${{ github.repository_owner }}/stockai:${{ github.sha }}
